name: nostr_namecoin
description: Censorship-resistant Nostr identity on Namecoin.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1

  # Namecoin transaction codec
  namecoin:
    path: package/dart-namecoin

  # Nostr protocol (keys, events, NIP-17/44/59, relays)
  nostr:
    git:
      url: https://github.com/ethicnology/dart-nostr
      ref: develop

  # Electrum client for Namecoin chain queries
  electrum_adapter:
    git:
      url: https://github.com/cypherstack/electrum_adapter
      ref: 0de864a35c71fce3a07e6a53b623619b32394b8d

  # Wallet (ethicnology packages)
  bip39_mnemonic: ^4.0.1
  bip32_keys: ^3.1.1
  bip21_uri: ^2.1.3

  # Transaction building + native secp256k1 for Flutter
  coinlib:
    git:
      url: https://www.github.com/julian-CStack/coinlib
      ref: f90600053a4f149a6153f30057ac7f75c21ab962
      path: coinlib
  coinlib_flutter:
    git:
      url: https://www.github.com/julian-CStack/coinlib
      ref: f90600053a4f149a6153f30057ac7f75c21ab962
      path: coinlib_flutter

  # Database
  drift: ^2.31.0
  sqlite3: ^2.7.0
  sqlcipher_flutter_libs: ^0.6.0
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.31.0
  build_runner: ^2.4.0

dependency_overrides:
  pointycastle: ^4.0.0
  coinlib:
    git:
      url: https://www.github.com/julian-CStack/coinlib
      ref: f90600053a4f149a6153f30057ac7f75c21ab962
      path: coinlib

flutter:
  uses-material-design: true
